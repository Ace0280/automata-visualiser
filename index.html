<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AutomataViz — A visual simulator for DFA and NFA with step-by-step transition animation, epsilon closure support, and interactive graph rendering.">
  <title>AutomataViz — DFA / NFA Visual Simulator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header>
  <div>
    <div class="logo">AutomataViz</div>
    <div class="subtitle">DFA / NFA VISUAL SIMULATOR</div>
  </div>
  <div class="header-actions">
    <span class="badge dfa-badge" id="mode-badge">DFA MODE</span>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme">☀️</button>
  </div>
</header>

<main>
  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar">

    <!-- Presets -->
    <div class="sidebar-section">
      <h3>Quick Presets</h3>
      <div class="presets">
        <button class="preset-btn" data-preset="even_zeros">
          Strings with even number of 0s
          <span>DFA over {0,1}</span>
        </button>
        <button class="preset-btn" data-preset="ends_01">
          Strings ending in "01"
          <span>DFA over {0,1}</span>
        </button>
        <button class="preset-btn" data-preset="nfa_ab">
          Strings containing "ab"
          <span>NFA over {a,b}</span>
        </button>
        <button class="preset-btn" data-preset="div3">
          Binary numbers divisible by 3
          <span>DFA over {0,1}</span>
        </button>
        <button class="preset-btn" data-preset="nfa_epsilon">
          ε-NFA: a*b* (epsilon transitions)
          <span>ε-NFA over {a,b}</span>
        </button>
      </div>
    </div>

    <!-- Define Automaton -->
    <div class="sidebar-section">
      <h3>Define Automaton</h3>
      <label for="inp-states">States (comma-separated)</label>
      <input type="text" id="inp-states" placeholder="q0, q1, q2" value="q0, q1, q2">
      <label for="inp-alpha">Alphabet (comma-separated)</label>
      <input type="text" id="inp-alpha" placeholder="0, 1" value="0, 1">
      <label for="inp-start">Start State</label>
      <input type="text" id="inp-start" placeholder="q0" value="q0">
      <label for="inp-final">Final States (comma-separated)</label>
      <input type="text" id="inp-final" placeholder="q0" value="q0">
      <div class="btn-row">
        <button class="btn primary" id="btn-build-table">Build Table →</button>
      </div>
    </div>

    <!-- Transition Table -->
    <div class="sidebar-section">
      <h3>Transition Table</h3>
      <div id="trans-table-container">
        <div style="color:var(--muted);font-size:12px;font-family:'Space Mono',monospace">
          Click "Build Table" to generate transitions
        </div>
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button class="btn" id="btn-draw-graph">Draw Graph</button>
      </div>
    </div>

    <!-- Test Input -->
    <div class="sidebar-section">
      <h3>Test Input</h3>
      <label for="inp-string">Input String</label>
      <input type="text" id="inp-string" placeholder="0110100" value="0110">
      <div class="btn-row">
        <button class="btn primary" id="btn-simulate">▶ Simulate</button>
        <button class="btn" id="btn-step">Step</button>
        <button class="btn" id="btn-reset">Reset</button>
      </div>
    </div>

    <!-- Export / Import -->
    <div class="sidebar-section">
      <h3>Import / Export</h3>
      <div class="btn-row">
        <button class="btn" id="btn-export">⬇ Export JSON</button>
        <button class="btn" id="btn-import">⬆ Import JSON</button>
      </div>
    </div>

  </div>

  <!-- ═══ CANVAS ═══ -->
  <div id="canvas-area">
    <div class="grid-bg"></div>
    <svg id="main-svg"></svg>
  </div>

  <!-- ═══ CONTROL BAR ═══ -->
  <div class="control-bar">
    <div class="input-string-display" id="char-display"></div>
    <div class="trace-log" id="trace-log">Ready. Draw a graph and simulate.</div>
    <div class="speed-control">
      <label for="speed-slider">Speed</label>
      <input type="range" id="speed-slider" min="200" max="2000" step="100" value="700">
      <span id="speed-label">700ms</span>
    </div>
    <span class="status-badge status-idle" id="status-badge">IDLE</span>
  </div>

  <!-- ═══ HISTORY PANEL ═══ -->
  <div class="history-panel" id="history-panel">
    <div class="history-header">
      <h4>Simulation History</h4>
      <span class="toggle-icon">▼</span>
    </div>
    <div class="history-content" id="history-content"></div>
  </div>

</main>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts (order matters: dependencies first) -->
<script src="js/automaton.js"></script>
<script src="js/ui.js"></script>
<script src="js/graph.js"></script>
<script src="js/simulator.js"></script>
<script src="js/app.js"></script>

</body>
</html>
